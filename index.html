<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniLarry</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 1rem; background: #f7fafc; color: #111827; }
        h1 { margin-bottom: .3rem; }
        #status { margin-bottom: .8rem; color: #374151; }
        #tasks { list-style: none; margin: 0; padding: 0; }
        #tasks li { display: flex; align-items: flex-start; gap: .5rem; background: white; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: .5rem; padding: .6rem .8rem; }
        #tasks li code { background: #f3f4f6; display: block; white-space: pre-wrap; word-break: break-word; padding: .25rem .4rem; border-radius: 4px; }
        #controls { margin-bottom: .7rem; }
        button { cursor: pointer; border-radius: 6px; border: 1px solid #9ca3af; background: #e5e7eb; padding: .35rem .75rem; }
        button:hover { background: #d1d5db; }
    </style>
</head>
    <body>
        <h1>MiniLarry</h1>
        <div id="status"></div>
        <div id="controls">
            <button id="clearBtn">Lokale Checkmarks zurücksetzen</button>
        </div>
        <ul id="tasks"></ul>
        <script>
            const codes = [
                'USNC', 'OVPA', '8IZQ', 'AKT8',
                'FEZ2', 'XYFE', 'FOME', 'FBD2',
                'KEOA', 'UBGK', 'V24G', 'BY3A',
                'FBD2', '9ZJQ', 'TVNY', 'N8FX'
            ];

            const storagePrefix = 'code-check-';
            const status = document.getElementById('status');
            const taskList = document.getElementById('tasks');
            const clearBtn = document.getElementById('clearBtn');

            function saveCheck(index, checked) {
                localStorage.setItem(storagePrefix + index, checked ? 'true' : 'false');
            }

            function loadCheck(index) {
                return localStorage.getItem(storagePrefix + index) === 'true';
            }

            function renderCodes() {
                taskList.innerHTML = '';
                codes.forEach((code, i) => {
                    const li = document.createElement('li');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = loadCheck(i);
                    cb.title = 'als erledigt markieren';
                    cb.addEventListener('change', () => saveCheck(i, cb.checked));

                    const text = document.createElement('div');
                    const line = document.createElement('span');
                    line.innerHTML = `<strong>#${i + 1}</strong> `;
                    text.appendChild(line);

                    const codeEl = document.createElement('code');
                    codeEl.textContent = code;
                    text.appendChild(codeEl);

                    li.appendChild(cb);
                    li.appendChild(text);
                    taskList.appendChild(li);
                });
                status.textContent = `${codes.length} Codes geladen.`;
            }

            clearBtn.addEventListener('click', () => {
                codes.forEach((_, i) => localStorage.removeItem(storagePrefix + i));
                renderCodes();
            });

            renderCodes();
        </script>

        <h2>Diese Website ist Inofiziel und hat nix mit Minimoli oder LVM zu tun</h2>

    </body>
</html>
